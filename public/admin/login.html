<!DOCTYPE html> 
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GlowSuite AI – Login</title>

    <style>
        /* ---------------------------------------------------
           GLOWSUITE NEURAL REACTOR LOADER
        --------------------------------------------------- */
        #glowLoader {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center,
                #1a0e0e 0%, #0b0606 50%, #000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            animation: fadeOutLoader 1s ease forwards;
            animation-delay: 2.2s;
        }

        .reactor-core {
            position: relative;
            width: 150px;
            height: 150px;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(255, 180, 120, 0.6);
            animation: rotate 4s linear infinite;
            box-shadow: 0 0 35px rgba(255, 150, 100, 0.4);
        }

        .ring.outer { width: 150px; height: 150px; }
        .ring.mid { width: 110px; height: 110px; top: 20px; left: 20px; animation-duration: 3s; }
        .ring.inner { width: 70px; height: 70px; top: 40px; left: 40px; animation-duration: 2s; }

        .core-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 22px;
            height: 22px;
            background: radial-gradient(circle,
                #ffddb8 0%, #ffb47a 60%, rgba(255, 180, 120, 0) 100%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow:
                0 0 20px #ffb47a,
                0 0 40px rgba(255, 150, 100, 0.6),
                0 0 90px rgba(255, 150, 100, 0.3);
            animation: pulseCore 2s ease-in-out infinite; /* ← FIX HIER */
        }

        @keyframes rotate { 100% { transform: rotate(360deg); } }

        @keyframes pulseCore {
            0% { transform: translate(-50%, -50%) scale(1); opacity: .8; }
            50% { transform: translate(-50%, -50%) scale(1.25); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: .8; }
        }

        @keyframes fadeOutLoader { to { opacity: 0; visibility: hidden; } }

        /* ---------------------------------------------------
           BACKGROUND – SIGNATURE
        --------------------------------------------------- */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: radial-gradient(circle at center,
                    #160b0b 0%,
                    #090606 55%,
                    #000000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            font-family: "Inter", sans-serif;
            color: #fff;
            position: relative;
            overflow: hidden;
            padding-top: 60px;
        }

        .fog {
            position: absolute;
            width: 220%;
            height: 220%;
            background: radial-gradient(circle,
                    rgba(255, 180, 120, 0.08),
                    transparent 70%);
            top: -60%;
            left: -60%;
            animation: fogMove 22s ease-in-out infinite alternate;
            pointer-events: none;
            filter: blur(60px);
            opacity: 0.35;
        }

        @keyframes fogMove {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(20px, -18px) scale(1.06); }
        }

        .particles {
            position: absolute;
            inset: 0;
            background: url("https://i.imgur.com/0v5F2Yk.png");
            opacity: 0.06;
            mix-blend-mode: screen;
            animation: neuralFloat 40s linear infinite;
            pointer-events: none;
        }

        @keyframes neuralFloat {
            100% { transform: translateY(-260px); }
        }

        /* ---------------------------------------------------
           LOGO
        --------------------------------------------------- */
        .logo-container {
            position: relative;
            margin-bottom: 40px;
            transition: transform 0.15s ease-out;
            opacity: 0;
            animation: fadeIn 1.3s ease forwards;
            animation-delay: 2.3s;
        }

        .logo-container::before {
            content: "";
            position: absolute;
            width: 360px;
            height: 220px;
            background: radial-gradient(circle,
                    rgba(255, 190, 140, 0.20),
                    transparent 80%);
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            filter: blur(55px);
            z-index: -1;
        }

        .logo {
            width: 205px;
            filter: drop-shadow(0 0 14px rgba(255, 190, 130, 0.9))
                    drop-shadow(0 0 28px rgba(255, 150, 100, 0.35));
            animation: softPulse 3.4s ease-in-out infinite alternate;
        }

        @keyframes softPulse {
            0% { filter: drop-shadow(0 0 12px rgba(255, 200, 150, 0.7)); }
            100% { filter: drop-shadow(0 0 26px rgba(255, 180, 120, 1)); }
        }

        @keyframes fadeIn { to { opacity: 1; } }

        /* ---------------------------------------------------
           LOGIN BOX
        --------------------------------------------------- */
        .login-box {
            width: 360px;
            padding: 32px 26px;
            background: #1a1212;
            border-radius: 20px;
            border: 1px solid rgba(255, 180, 130, 0.22);
            position: relative;
            overflow: hidden;
            box-shadow:
                0 0 22px rgba(255, 150, 100, 0.08),
                0 0 60px rgba(255, 120, 80, 0.05),
                inset 0 0 14px rgba(255, 180, 130, 0.07);
            opacity: 0;
            animation: fadeIn 1.2s ease forwards;
            animation-delay: 2.4s;
        }

        .login-box::after {
            content: "";
            position: absolute;
            top: -140%;
            left: -60%;
            width: 220%;
            height: 180%;
            background: linear-gradient(135deg,
                    rgba(255, 220, 180, 0.15),
                    rgba(255, 200, 160, 0.04),
                    transparent 70%);
            transform: rotate(12deg);
            animation: sweep 6s ease-in-out infinite;
        }

        h2 {
            font-size: 27px;
            text-align: center;
            margin-bottom: 18px;
            color: #ffd9b6;
            text-shadow:
                0 0 14px rgba(255, 200, 150, 0.55),
                0 0 24px rgba(255, 150, 120, 0.25);
        }

        input {
            width: 100%;
            padding: 15px 18px;
            margin-bottom: 18px;
            background: #2a2222;
            border: 1px solid rgba(255, 180, 130, 0.25);
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            transition: 0.25s ease;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #ffb088;
            box-shadow: 0 0 18px rgba(255, 150, 120, 0.5);
            outline: none;
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, #f1c28a, #d2797c);
            color: #fff;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.25s;
            margin-top: 6px;
            box-shadow: 0 0 16px rgba(255, 140, 110, 0.25);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 34px rgba(255, 150, 130, 0.55);
        }

        .footer {
            margin-top: 14px;
            text-align: center;
            color: #bda89b;
            font-size: 13px;
        }
    </style>
</head>

<body>

    <!-- 🔥 Whisper Luxury Voice -->
    <audio id="welcomeVoice" src="./Stimme/willkommen.mp3"></audio>

    <!-- 🔥 GlowSuite Loader -->
    <div id="glowLoader">
        <div class="reactor-core">
            <div class="ring outer"></div>
            <div class="ring mid"></div>
            <div class="ring inner"></div>
            <div class="core-glow"></div>
        </div>
    </div>

    <div class="fog"></div>
    <div class="particles"></div>

    <div class="logo-container" id="parallaxLogo">
        <img src="../assets/login.png" class="logo" alt="GlowSuite AI Logo" />
    </div>

    <div class="login-box">
        <h2>Willkommen</h2>

        <input type="text" id="username" placeholder="Benutzername" />
        <input type="password" id="password" placeholder="Passwort" />

        <button onclick="login()">Anmelden</button>

        <div class="footer">© 2025 GlowSuite AI</div>
    </div>

    <!-- PARALLAX & VOICE SCRIPT -->
    <script>
        const logo = document.getElementById("parallaxLogo");
        document.addEventListener("mousemove", (e) => {
            let x = (e.clientX / window.innerWidth - 0.5) * 6;
            let y = (e.clientY / window.innerHeight - 0.5) * 6;
            logo.style.transform = `translate(${x}px, ${y}px)`;
        });

        const voice = document.getElementById("welcomeVoice");

        window.addEventListener("load", () => {
            setTimeout(() => {
                voice.volume = 0.65;
                voice.play().catch(() => {});
            }, 300);
        });

        setTimeout(() => {
            let fade = setInterval(() => {
                if (voice.volume > 0.05) {
                    voice.volume -= 0.05;
                } else {
                    voice.pause();
                    clearInterval(fade);
                }
            }, 120);
        }, 1800);

        /* ---------------------------------------------------
           🔥 LOGIN MIT SOUND + DELAY + LOGIN-SAVE
        --------------------------------------------------- */
        let loginLocked = false;

        function login() {
            if (loginLocked) return;

            const u = document.getElementById("username").value;
            const p = document.getElementById("password").value;

            if (u === "admin" && p === "admin") {

                loginLocked = true;
                const btn = document.querySelector("button");
                btn.disabled = true;
                btn.style.opacity = "0.6";
                btn.style.cursor = "not-allowed";

                // Login speichern (NEU)
                localStorage.setItem("loggedIn", "true");

                // Willkommen Sound
                const sound = new Audio("./Stimme/willkommen.mp3");
                sound.volume = 1;
                sound.play().catch(() => {});

                // Nach 6 Sekunden → Dashboard
                setTimeout(() => {
                    window.location.href = "/admin/index.html";
                }, 6000);

            } else {
                alert("Ungültige Zugangsdaten");
            }
        }
    </script>

</body>
</html>
