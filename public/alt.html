<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beauty Lounge Chat</title>
  <link rel="stylesheet" href="/fonts/Inter.css" />

  <style>
    :root {
      --bg: #f8f6f3;
      --card: #ffffff;
      --text: #2b2b2b;
      --muted: #7a7a7a;
      --brand: #c7a06d;
      --brandDark: #a58356;
      --accent: #f3ece4;
      --radius: 18px;
    }
    :root[data-theme="dark"] {
      --bg: #0f0f10;
      --card: #18191a;
      --text: #eaeaea;
      --muted: #a0a0a0;
      --brand: #d4af74;
      --brandDark: #b48c52;
      --accent: #1d1d1f;
    }

    body {
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: var(--text);
      transition: background 0.3s ease, color 0.3s ease;
    }

    .chat-container {
      width: 420px;
      max-width: 95%;
      height: 640px;
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      background: var(--card);
      border: 1px solid rgba(0,0,0,0.05);
    }

    .chat-header {
      background: linear-gradient(120deg, var(--brand) 0%, var(--brandDark) 100%);
      color: #fff;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 18px;
      font-weight: 600;
    }

    .theme-toggle {
      background: transparent;
      border: none;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .chat-messages {
      flex: 1;
      padding: 14px;
      overflow-y: auto;
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    .message {
      margin: 8px 0;
      padding: 12px 16px;
      border-radius: 16px;
      max-width: 82%;
      line-height: 1.5;
      font-size: 15px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.06);
      animation: fadeIn 0.35s ease;
    }

    .user { background: var(--brand); color: #fff; align-self: flex-end; }
    .bot { background: var(--accent); color: var(--text); align-self: flex-start; }

    .link-button {
      display: inline-block;
      margin-top: 8px;
      padding: 8px 12px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 14px;
      color: #fff;
      background: var(--brandDark);
    }

    .chat-input {
      display: flex;
      flex-direction: column;
      border-top: 1px solid rgba(0,0,0,0.08);
      background: var(--card);
      padding: 8px;
    }

    .chat-input-row {
      display: flex;
      align-items: center;
    }

    .chat-input input {
      flex: 1;
      border: none;
      padding: 12px 14px;
      border-radius: var(--radius);
      background: var(--accent);
      color: var(--text);
    }

    .chat-input button {
      background: var(--brand);
      border: none;
      color: white;
      padding: 10px 16px;
      border-radius: var(--radius);
      margin-left: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 17px;
    }

    .book-btn {
      margin-top: 6px;
      background: var(--brandDark);
      width: 100%;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="chat-container">
    <div class="chat-header">
      <span>💬 Beauty Lounge Assistent</span>
      <button class="theme-toggle" id="themeToggle">🌙</button>
    </div>

    <div class="chat-messages" id="messages"></div>

    <div class="chat-input">
      <div class="chat-input-row">
        <input id="messageInput" type="text" placeholder="Nachricht eingeben…" autocomplete="off" />
        <button id="sendButton">➤</button>
      </div>
      <button class="book-btn" id="bookButton">✨ Jetzt Termin buchen</button>
    </div>
  </div>

  <script type="module">
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendButton");
    const themeBtn = document.getElementById("themeToggle");
    const bookBtn = document.getElementById("bookButton");

    // THEME
    themeBtn.addEventListener("click", () => {
      const cur = document.documentElement.getAttribute("data-theme") || "light";
      const next = cur === "light" ? "dark" : "light";
      document.documentElement.setAttribute("data-theme", next);
      themeBtn.textContent = next === "light" ? "🌙" : "☀️";
    });

    // MESSAGE
    function addMessage(text, sender = "bot") {
      const div = document.createElement("div");
      div.className = `message ${sender}`;

      if (text.includes("/pdf/") || text.includes("/ics/")) {
        const parts = text.split("\n").filter(Boolean);
        for (const part of parts) {
          if (part.includes("/pdf/")) {
            const link = document.createElement("a");
            link.href = part.trim();
            link.target = "_blank";
            link.className = "link-button";
            link.textContent = "📄 Buchungsbestätigung (PDF)";
            div.appendChild(link);
          } else if (part.includes("/ics/")) {
            const link = document.createElement("a");
            link.href = part.trim();
            link.target = "_blank";
            link.className = "link-button";
            link.textContent = "📅 Kalendereintrag (ICS)";
            div.appendChild(link);
          } else {
            const span = document.createElement("div");
            span.textContent = part;
            div.appendChild(span);
          }
        }
      } else {
        div.textContent = text;
      }

      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // SEND
    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;
      addMessage(text, "user");
      inputEl.value = "";

      const loadingEl = addMessage("… tippt", "bot loading");

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, sender: "browser-widget" }),
        });
        messagesEl.removeChild(loadingEl);
        const data = await res.json();
        addMessage(data?.reply || "⚠️ Keine Antwort vom Server erhalten.", "bot");
      } catch {
        messagesEl.removeChild(loadingEl);
        addMessage("❌ Fehler beim Verbinden mit dem Server.", "bot");
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keypress", (e) => e.key === "Enter" && sendMessage());

    // TERMIN BUCHEN BUTTON
    bookBtn.addEventListener("click", () => {
      addMessage("📅 Lass uns deinen Termin buchen! Bitte gib deinen Namen und dein Wunschdatum ein.");
      inputEl.focus();
    });

    addMessage("👋 Willkommen! Ich bin dein Beauty Lounge Assistent. Wie kann ich helfen?");
  </script>
</body>
</html>
