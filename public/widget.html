<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beauty Agent – Online Termin</title>
  <link rel="stylesheet" href="/fonts/Inter.css" />

  <style>
    :root {
      --bg: #f8f3ec;
      --card: #ffffff;
      --text: #2b2b2b;
      --muted: #7a7a7a;
      --brand: #c38b5f;
      --brandDark: #b05f4b;
      --accent: #f5ebe2;
      --radius: 20px;

      --botBubble: #fffcf9;
      --botBorder: rgba(206, 183, 150, 0.7);
      --userBubbleFrom: #c94f74;
      --userBubbleTo: #c38b5f;
    }

    :root[data-theme="dark"] {
      --bg: #050506;
      --card: #121215;
      --text: #f4f4f4;
      --muted: #a0a0a0;
      --brand: #d4af74;
      --brandDark: #f4b78e;
      --accent: #18181b;

      --botBubble: #18151a;
      --botBorder: rgba(245, 226, 184, 0.38);
      --userBubbleFrom: #d9927c;
      --userBubbleTo: #b8795b;
    }

    /* =========================================================
       BODY – Hintergrundbild + sanfte Animation
    ========================================================== */
    body {
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      position: relative;
      overflow: hidden;

      background-image: url("/assets/Hintergrund.jpg");
      background-size: 112% 112%;
      background-position: 50% 50%;
      background-repeat: no-repeat;
      background-attachment: fixed;
      animation: bgDrift 36s ease-in-out infinite alternate;
    }

    @keyframes bgDrift {
      0%   { background-position: 49% 50%; }
      50%  { background-position: 53% 48%; }
      100% { background-position: 47% 52%; }
    }

    /* dezentes Noise / Glow über dem Hintergrund */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.12;
      background-image:
        linear-gradient(120deg, rgba(255,255,255,.18) 0, transparent 55%),
        linear-gradient(300deg, rgba(0,0,0,.14) 0, transparent 60%);
      mix-blend-mode: soft-light;
      z-index: -2;
    }

    /* Darkmode: leicht abdunkelnder Overlay */
    :root[data-theme="dark"] body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 30% 0%, rgba(0,0,0,0.55) 0, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(0,0,0,0.9) 0, rgba(0,0,0,0.7) 55%);
      pointer-events: none;
      z-index: -1;
    }

    /* =========================================================
       CHATBOX – schwebende Karte
    ========================================================== */
    .chatbox {
      width: 440px;
      max-width: 95vw;
      height: 640px;
      background: var(--card);
      border-radius: 26px;
      box-shadow:
        0 28px 70px rgba(0,0,0,0.45),
        0 0 0 1px rgba(255,255,255,0.85);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      backdrop-filter: blur(8px);
      transform-origin: 50% 0;
      animation: chatFloatIn 0.7s cubic-bezier(0.16, 0.8, 0.3, 1) forwards;
    }

    @keyframes chatFloatIn {
      0%   { opacity: 0; transform: translateY(18px) scale(0.97); }
      100% { opacity: 1; transform: translateY(0)    scale(1); }
    }

    .chatbox::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.35),
        0 0 50px rgba(255,255,255,0.55) inset;
      opacity: .5;
    }

    :root[data-theme="dark"] .chatbox {
      box-shadow:
        0 28px 80px rgba(0,0,0,0.85),
        0 0 0 1px rgba(255,255,255,0.18);
    }

    /* =========================================================
       HEADER
    ========================================================== */
    .chat-header {
      background: linear-gradient(135deg, #c94f74, #c38b5f);
      color: white;
      padding: 14px 18px 12px;
      font-weight: 500;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    :root[data-theme="dark"] .chat-header {
      background: linear-gradient(135deg, #d9927c, #d4af74);
    }

    .chat-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      width: 34px;
      height: 34px;
      border-radius: 18px;
      background: radial-gradient(circle at 30% 0%, #ffe9ce, #c46a4b 65%, #8b3b2c 100%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.7),
        0 8px 20px rgba(0,0,0,.4);
      flex-shrink: 0;
    }
    .brand-icon svg {
      width: 19px;
      height: 19px;
      stroke: #4b2619;
      stroke-width: 1.6;
      fill: none;
    }

    .chat-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .03em;
      line-height: 1.2;
    }
    .chat-subtitle {
      font-size: 12px;
      opacity: .9;
      margin-top: 2px;
    }

    #themeBtn {
      background: rgba(0,0,0,.20);
      border-radius: 999px;
      border: none;
      color: #ffeede;
      width: 30px;
      height: 30px;
      font-size: 17px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 0 0 1px rgba(255,255,255,.25);
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
    }

    #themeBtn:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.4), 0 4px 10px rgba(0,0,0,0.35);
      background: rgba(0,0,0,0.28);
    }

    :root[data-theme="dark"] #themeBtn {
      background: rgba(0,0,0,0.55);
      color: #ffecd5;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.35);
    }

    /* =========================================================
       MESSAGES – inneres Panel
    ========================================================== */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px 12px;
      margin: 14px 16px 12px;
      border-radius: 22px;
      border: 1px solid rgba(212,175,115,0.6);
      background:
        radial-gradient(circle at 0% 0%, rgba(255,255,255,0.96) 0, rgba(250,245,238,0.97) 55%);
      color: var(--text);
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.7),
        0 14px 35px rgba(0,0,0,0.10) inset;
    }

    :root[data-theme="dark"] #messages {
      background:
        radial-gradient(circle at 0% 0%, #26202a 0, #141016 55%);
      border-color: rgba(245,226,184,0.55);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.15),
        0 18px 45px rgba(0,0,0,0.65) inset;
    }

    .msg {
      margin: 8px 0;
      padding: 11px 15px;
      border-radius: 14px;
      line-height: 1.5;
      max-width: 92%;
      box-shadow: 0 3px 8px rgba(0,0,0,0.06);
      font-size: 14px;
      animation: msgIn 0.25s ease-out;
      transform-origin: 0 0;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(4px) scale(.98); }
      to   { opacity: 1; transform: translateY(0)  scale(1); }
    }

    .msg.bot {
      background: var(--botBubble);
      border: 1px solid var(--botBorder);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .msg.user {
      background: linear-gradient(135deg, var(--userBubbleFrom), var(--userBubbleTo));
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
      border-top-left-radius: 16px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.3);
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    /* =========================================================
       GOLD-LINE BUTTONS
    ========================================================== */
    .pill,
    .pill.alt {
      background: radial-gradient(circle at 30% 0%, #fff8ea, #d9a057 60%, #8a5320 100%);
      color: #4b2619;
      border: none;
      padding: 8px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .01em;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.85),
        0 6px 16px rgba(0,0,0,0.26);
      white-space: nowrap;
    }

    /* CTA – erste Aktion (Termin buchen) etwas stärker hervorheben */
    .pill--primary {
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.95),
        0 10px 26px rgba(0,0,0,0.38);
      animation: ctaPulse 3.5s ease-in-out infinite;
    }

    @keyframes ctaPulse {
      0%, 100% { transform: translateY(0); box-shadow: 0 0 0 1px rgba(255,255,255,0.95), 0 10px 26px rgba(0,0,0,0.38); }
      50%      { transform: translateY(-1px); box-shadow: 0 0 0 2px rgba(255,255,255,1), 0 14px 32px rgba(0,0,0,0.45); }
    }

    .pill:hover,
    .pill.alt:hover {
      transform: translateY(-1px);
      filter: brightness(1.12);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.95),
        0 8px 20px rgba(0,0,0,0.32);
    }

    .pill span.icon {
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    /* kleine Chips / Tags */
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(195,139,95,0.12);
      color: var(--brandDark);
      padding: 5px 11px;
      border-radius: 999px;
      font-size: 12px;
      margin-top: 4px;
      border: 1px solid rgba(195,139,95,0.28);
    }

    :root[data-theme="dark"] .tag {
      background: rgba(212,175,115,0.12);
      color: #f5e2b8;
      border-color: rgba(212,175,115,0.4);
    }

    /* Muted Text */
    .muted-small {
      font-size: 12px;
      color: var(--muted);
      display: block;
      margin-top: 4px;
    }
    .muted-note {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
    }

    /* Inputs im Chat (Name, Telefon, E-Mail) */
    .msg input {
      width: 100%;
      margin-top: 8px;
      padding: 7px 10px;
      border-radius: 10px;
      border: 1px solid rgba(210,190,160,0.7);
      font-size: 13px;
      outline: none;
      background: rgba(255,255,255,0.96);
      color: var(--text);
    }

    :root[data-theme="dark"] .msg input {
      background: #141216;
      border-color: rgba(245,226,184,0.4);
      color: #fef6ea;
    }

    .msg input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 1px rgba(212,175,115,0.4);
    }

    /* =========================================================
       INPUT-BEREICH
    ========================================================== */
    .chat-input {
      padding: 9px 12px;
      border-top: 1px solid rgba(0,0,0,0.04);
      background: rgba(255,255,255,0.97);
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 2;
    }

    :root[data-theme="dark"] .chat-input {
      background: rgba(12,11,13,0.96);
      border-top-color: rgba(255,255,255,0.08);
    }

    .chat-input input {
      flex: 1;
      border-radius: 999px;
      border: 1px solid rgba(210,190,160,0.8);
      padding: 8px 12px;
      font-size: 13px;
      outline: none;
      background: rgba(255,255,255,0.9);
      color: var(--text);
    }

    :root[data-theme="dark"] .chat-input input {
      background: #141216;
      border-color: rgba(245,226,184,0.5);
      color: #fef6ea;
    }

    .chat-input button {
      background: linear-gradient(135deg, #c94f74, #c38b5f);
      color: #fff;
      border: none;
      padding: 8px 20px;
      border-radius: 999px;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
      box-shadow: 0 6px 15px rgba(0,0,0,.25);
      transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
    }

    .chat-input button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
      box-shadow: 0 8px 20px rgba(0,0,0,0.32);
    }

    :root[data-theme="dark"] .chat-input button {
      background: linear-gradient(135deg, #d9927c, #d4af74);
      box-shadow: 0 6px 18px rgba(0,0,0,0.6);
    }

    /* Scrollbar dezent */
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,.18);
      border-radius: 8px;
    }
  </style>
</head>

<body>
  <div class="chatbox">
    <div class="chat-header">
      <div class="chat-header-left">
        <span class="brand-icon">
          <!-- Premium-Gem-Icon -->
          <svg viewBox="0 0 24 24">
            <path d="M4 9L8 3h8l4 6-8 12z" />
            <path d="M4 9h16" />
            <path d="M9 9l3 12" />
            <path d="M15 9l-3 12" />
          </svg>
        </span>
        <div>
          <div id="chatTitle" class="chat-title">Beauty Lounge – Beauty Agent</div>
          <div id="chatSubtitle" class="chat-subtitle">Online-Termin &amp; Fragen</div>
        </div>
      </div>
      <button id="themeBtn" aria-label="Theme umschalten">🌙</button>
    </div>

    <div id="messages"></div>

    <div class="chat-input">
      <input id="userInput" placeholder='Schreib z. B. „Termin buchen“ oder frag nach …' />
      <button id="sendBtn">Senden</button>
    </div>
  </div>

  <!-- Widget-Logik -->
  <script type="module" src="/widget.js"></script>
</body>
</html>
